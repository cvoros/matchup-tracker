<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚾ Streaming Matchup Rankings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --muted: #8b949e;
    --gold: #e6b44c;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  body {
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  header {
    background: linear-gradient(180deg, #0d1b2e 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }

  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--gold);
  }

  header p {
    margin-top: 0.4rem;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 1.5rem 1rem 0;
    flex-wrap: wrap;
  }

  .tab {
    padding: 0.5rem 1.25rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover { border-color: var(--gold); color: var(--text); }

  .tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0d1117;
    font-weight: 700;
  }

  .container {
    max-width: 860px;
    margin: 1.5rem auto 0;
    padding: 0 1rem;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  thead tr {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 0.75rem 1rem;
    text-align: right;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  th:nth-child(2) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
  tbody tr:hover { background: rgba(255,255,255,0.05); }

  tbody tr.top5 { border-left: 3px solid rgba(63, 185, 80, 0.5); }
  tbody tr.bot5 { border-left: 3px solid rgba(248, 81, 73, 0.4); }

  td {
    padding: 0.7rem 1rem;
    text-align: right;
    white-space: nowrap;
  }

  td:nth-child(1) { font-weight: 700; color: var(--gold); width: 3rem; }
  td:nth-child(2) { text-align: left; font-weight: 500; }

  .green { color: var(--green); font-weight: 600; }
  .red   { color: var(--red);   font-weight: 600; }

  .comp {
    font-weight: 700;
    font-size: 0.95rem;
  }

  footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.78rem;
    color: var(--muted);
    padding: 0 1rem;
    line-height: 1.6;
  }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .error {
    text-align: center;
    padding: 2rem;
    color: var(--red);
    font-size: 0.9rem;
  }

  tbody tr { cursor: pointer; }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 480px;
    padding: 1.5rem;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 0.75rem;
    right: 1rem;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.25rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 0.25rem;
  }

  .modal-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  .pitcher-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .pitcher-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
  }

  .pitcher-date {
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 3.5rem;
  }

  .pitcher-opp {
    font-size: 0.8rem;
    color: var(--text);
    min-width: 5rem;
  }

  .pitcher-name {
    font-size: 0.875rem;
    font-weight: 600;
    flex: 1;
  }

  .pitcher-hand {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    background: rgba(230,180,76,0.15);
    color: var(--gold);
  }

  .pitcher-tbd { color: var(--muted); font-style: italic; }
  .modal-loading { color: var(--muted); font-size: 0.875rem; text-align: center; padding: 1.5rem 0; }
  .modal-error { color: var(--red); font-size: 0.875rem; text-align: center; padding: 1rem 0; }
</style>
</head>
<body>

<header>
  <h1>⚾ Streaming Matchup Rankings</h1>
  <p id="updated">Loading…</p>
</header>

<div class="tabs">
  <button class="tab active" data-key="season">Full Season</button>
  <button class="tab" data-key="last30">Last 30 Days</button>
  <button class="tab" data-key="last15">Last 15 Days</button>
</div>

<div class="container">
  <div class="table-wrap" id="table-wrap">
    <div class="loading">Loading stats…</div>
  </div>
</div>

<!-- Pitcher Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <h2 id="modal-title"></h2>
    <div class="modal-sub">Probable pitchers — next 5 days</div>
    <div class="pitcher-list" id="pitcher-list"></div>
  </div>
</div>

<footer>
  Composite = avg of K/G rank + R/G rank. Higher = better streaming matchup for ESPN H2H points leagues.
</footer>

<script>
  let statsData = null;
  let activeKey = 'season';

  function compColor(composite) {
    const t = (composite - 1) / 29;
    if (t >= 0.6) return 'var(--green)';
    if (t >= 0.35) return 'var(--yellow)';
    return 'var(--red)';
  }

  function renderTable(rows) {
    const wrap = document.getElementById('table-wrap');
    if (!rows || !rows.length) {
      wrap.innerHTML = '<div class="error">No data available.</div>';
      return;
    }

    const trs = rows.map(r => {
      const cls = r.rank <= 5 ? 'top5' : r.rank > rows.length - 5 ? 'bot5' : '';

      const rpgCls = r.r_rank >= 21 ? 'green' : r.r_rank <= 10 ? 'red' : '';
      const kpgCls = r.k_rank >= 21 ? 'green' : r.k_rank <= 10 ? 'red' : '';

      const compStyle = `color:${compColor(r.composite)}`;

      return `<tr class="${cls}" data-team="${r.team}" data-team-id="${r.teamId}">
        <td>${r.rank}</td>
        <td>${r.team}</td>
        <td class="${rpgCls}">${r.rpg.toFixed(2)}</td>
        <td class="${kpgCls}">${r.kpg.toFixed(2)}</td>
        <td class="comp" style="${compStyle}">${r.composite.toFixed(1)}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<table>
      <thead><tr>
        <th>Rank</th>
        <th style="text-align:left">Team</th>
        <th>R/G</th>
        <th>K/G</th>
        <th>Composite</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;

    wrap.querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', () => {
        openTeamModal(tr.dataset.team, Number(tr.dataset.teamId));
      });
    });
  }

  function switchTab(key) {
    activeKey = key;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.key === key);
    });
    if (statsData) renderTable(statsData[key]);
  }

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.key));
  });

  // Modal logic
  const backdrop = document.getElementById('modal-backdrop');
  const modalTitle = document.getElementById('modal-title');
  const pitcherList = document.getElementById('pitcher-list');

  document.getElementById('modal-close').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() { backdrop.classList.remove('open'); }

  function pad(n) { return String(n).padStart(2, '0'); }

  function fmtDate(iso) {
    const [, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[+m-1]} ${+d}`;
  }

  async function openTeamModal(teamName, teamId) {
    modalTitle.textContent = teamName;
    pitcherList.innerHTML = '<div class="modal-loading">Loading schedule…</div>';
    backdrop.classList.add('open');

    const today = new Date();
    const end = new Date(today);
    end.setDate(end.getDate() + 4);
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${teamId}` +
      `&startDate=${fmt(today)}&endDate=${fmt(end)}&hydrate=probablePitcher`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const games = (data.dates || []).flatMap(d => d.games || []);

      if (!games.length) {
        pitcherList.innerHTML = '<div class="modal-loading">No games scheduled in the next 5 days.</div>';
        return;
      }

      pitcherList.innerHTML = games.map(g => {
        const isHome = g.teams.home.team.id === teamId;
        const opp = isHome ? g.teams.away.team.name : g.teams.home.team.name;
        const prefix = isHome ? 'vs' : '@';
        const pitcher = isHome
          ? g.teams.home.probablePitcher
          : g.teams.away.probablePitcher;

        const name = pitcher ? pitcher.fullName : null;
        const hand = pitcher?.pitchHand?.code || null;

        return `<div class="pitcher-row">
          <span class="pitcher-date">${fmtDate(g.gameDate.slice(0,10))}</span>
          <span class="pitcher-opp">${prefix} ${opp.replace(/^.+ /, '')}</span>
          ${name
            ? `<span class="pitcher-name">${name}</span>${hand ? `<span class="pitcher-hand">${hand}HP</span>` : ''}`
            : `<span class="pitcher-name pitcher-tbd">TBD</span>`}
        </div>`;
      }).join('');

    } catch (err) {
      pitcherList.innerHTML = `<div class="modal-error">Failed to load schedule.<br><small>${err.message}</small></div>`;
    }
  }

  fetch('./data/stats.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      statsData = data;
      document.getElementById('updated').textContent = `Updated: ${data.updated}`;
      renderTable(data[activeKey]);
    })
    .catch(err => {
      document.getElementById('table-wrap').innerHTML =
        `<div class="error">Failed to load stats.json — run fetch_stats.py first.<br><small>${err.message}</small></div>`;
    });
</script>
</body>
</html>
