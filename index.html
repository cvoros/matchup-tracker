<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚾ Streaming Matchup Rankings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --muted: #8b949e;
    --gold: #e6b44c;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  body {
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  header {
    background: linear-gradient(180deg, #0d1b2e 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }

  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--gold);
  }

  header p {
    margin-top: 0.4rem;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .tabs {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    padding: 1.5rem 1rem 0;
    flex-wrap: wrap;
  }

  .tab-group {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .tab-group .tab {
    border: none;
    border-radius: 0;
    border-right: 1px solid var(--border);
  }

  .tab-group .tab:last-child {
    border-right: none;
  }

  .tab {
    padding: 0.5rem 1.25rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover { border-color: var(--gold); color: var(--text); }

  .tab-divider {
    width: 1px;
    background: var(--border);
    margin: 0 0.25rem;
    align-self: stretch;
  }

  .tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0d1117;
    font-weight: 700;
  }

  .container {
    max-width: 860px;
    margin: 1.5rem auto 0;
    padding: 0 1rem;
  }

  /* Rankings table */
  .table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  thead tr {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 0.75rem 1rem;
    text-align: right;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  th:nth-child(2) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
  tbody tr:hover { background: rgba(255,255,255,0.05); }

  tbody tr.top5 { border-left: 3px solid rgba(63, 185, 80, 0.5); }
  tbody tr.bot5 { border-left: 3px solid rgba(248, 81, 73, 0.4); }

  td {
    padding: 0.7rem 1rem;
    text-align: right;
    white-space: nowrap;
  }

  td:nth-child(1) { font-weight: 700; width: 3rem; }
  td:nth-child(2) { text-align: left; font-weight: 500; }

  .green  { color: var(--green);  font-weight: 600; }
  .yellow { color: var(--yellow); font-weight: 600; }
  .red    { color: var(--red);    font-weight: 600; }

  .comp {
    font-weight: 700;
    font-size: 0.95rem;
  }

  /* Calendar view */
  #calendar-view { display: none; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.75rem;
  }

  @media (orientation: portrait) and (max-width: 767px) {
    table th:nth-child(3),
    table td:nth-child(3),
    table th:nth-child(4),
    table td:nth-child(4),
    table th:nth-child(5),
    table td:nth-child(5),
    table th:nth-child(6),
    table td:nth-child(6) { display: none; }
    table th:nth-child(7),
    table td:nth-child(7) { display: table-cell; }
  }

  @media (max-width: 700px) {
    .cal-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 400px) {
    .cal-grid { grid-template-columns: 1fr; }
  }

  .cal-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .cal-header {
    background: rgba(230,180,76,0.12);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 0.75rem;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    white-space: nowrap;
  }

  .cal-entry {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    cursor: default;
  }

  .cal-entry:last-child { border-bottom: none; }

  .cal-entry:nth-child(even) { background: rgba(255,255,255,0.02); }

  .cal-rank {
    font-size: 0.65rem;
    color: var(--muted);
  }

  .cal-pitcher {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
  }

  .cal-pitcher.tbd {
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
  }

  .cal-meta {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  .cal-hand {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    background: rgba(230,180,76,0.15);
    color: var(--gold);
  }

  .cal-loading {
    padding: 2rem 1rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    grid-column: 1 / -1;
  }

  .cal-error {
    padding: 1.5rem 1rem;
    text-align: center;
    color: var(--red);
    font-size: 0.85rem;
    grid-column: 1 / -1;
  }

  /* Modal */
  footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.78rem;
    color: var(--muted);
    padding: 0 1rem;
    line-height: 1.6;
  }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .error {
    text-align: center;
    padding: 2rem;
    color: var(--red);
    font-size: 0.9rem;
  }

  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 480px;
    padding: 1.5rem;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 0.75rem;
    right: 1rem;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.25rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 0.25rem;
  }

  .modal-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  .pitcher-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .pitcher-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
  }

  .pitcher-date {
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 6rem;
  }

  .pitcher-opp {
    font-size: 0.8rem;
    color: var(--text);
    min-width: 5rem;
  }

  .pitcher-name {
    font-size: 0.875rem;
    font-weight: 600;
    flex: 1;
  }

  .pitcher-hand {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    background: rgba(230,180,76,0.15);
    color: var(--gold);
  }

  .pitcher-tbd { color: var(--muted); font-style: italic; }
  .modal-loading { color: var(--muted); font-size: 0.875rem; text-align: center; padding: 1.5rem 0; }
  .modal-error { color: var(--red); font-size: 0.875rem; text-align: center; padding: 1rem 0; }
</style>
</head>
<body>

<header>
  <h1>⚾ Streaming Matchup Rankings</h1>
  <p id="updated">Loading…</p>
</header>

<div class="tabs">
  <div class="tab-group">
    <button class="tab active" data-key="season">Full Season</button>
    <button class="tab" data-key="last30">Last 30 Days</button>
    <button class="tab" data-key="last15">Last 15 Days</button>
  </div>
  <div class="tab-group">
    <button class="tab active" data-view="rankings">Team Rank</button>
    <button class="tab" data-view="calendar">Calendar</button>
  </div>
</div>

<div class="container">
  <div id="rankings-view">
    <div class="table-wrap" id="table-wrap">
      <div class="loading">Loading stats…</div>
    </div>
  </div>

  <div id="calendar-view">
    <div class="cal-grid" id="cal-grid">
      <div class="cal-loading">Loading schedule…</div>
    </div>
  </div>
</div>

<!-- Pitcher Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <h2 id="modal-title"></h2>
    <div class="modal-sub">Probable pitchers — next 5 days</div>
    <div class="pitcher-list" id="pitcher-list"></div>
  </div>
</div>

<footer>
  Stats vs starting pitchers only &nbsp;·&nbsp; Score = K/G − H/G − BB/G − 2×R/G &nbsp;·&nbsp; Higher = better streaming matchup for ESPN H2H points leagues.
</footer>

<script>
  let statsData = null;
  let activeKey = 'season';
  let activeWindow = 'season'; // tracks season / last30 / last15 independently of calendar tab

  function pad(n) { return String(n).padStart(2, '0'); }

  function fmtDate(iso) {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return `${days[dt.getDay()]} ${months[m-1]} ${d}`;
  }

  function dateKey(iso) { return iso.slice(0, 10); }

  function scoreColor(score, allScores) {
    const max = Math.max(...allScores);
    const min = Math.min(...allScores);
    const t = (score - min) / (max - min || 1);
    if (t >= 0.6) return 'var(--green)';
    if (t >= 0.3) return 'var(--yellow)';
    return 'var(--red)';
  }

  // Keep compColor for calendar (uses rank 1-30)
  function compColor(rank) {
    const t = 1 - (rank - 1) / 29;
    if (t >= 0.6) return 'var(--green)';
    if (t >= 0.3) return 'var(--yellow)';
    return 'var(--red)';
  }

  // ── Rankings table ──────────────────────────────────────────────

  function renderTable(rows) {
    const wrap = document.getElementById('table-wrap');
    if (!rows || !rows.length) {
      wrap.innerHTML = '<div class="error">No data available.</div>';
      return;
    }

    const allScores = rows.map(r => r.score);
    const n = rows.length;

    const trs = rows.map(r => {
      const cls = r.rank <= 5 ? 'top5' : r.rank > n - 5 ? 'bot5' : '';

      // Per-stat coloring: higher K/G = good (green), lower = red
      //                    lower H/G, BB/G, R/G = good (green), higher = red
      const kCls  = r.rank <= 10 ? 'green' : r.rank > n - 10 ? 'red' : 'yellow';
      const hCls  = r.rank <= 10 ? 'green' : r.rank > n - 10 ? 'red' : 'yellow';
      const bbCls = r.rank <= 10 ? 'green' : r.rank > n - 10 ? 'red' : 'yellow';
      const rCls  = r.rank <= 10 ? 'green' : r.rank > n - 10 ? 'red' : 'yellow';

      const scoreStyle = `color:${scoreColor(r.score, allScores)};font-weight:700`;

      const rankColor = scoreColor(r.score, allScores);
      return `<tr class="${cls}" data-team="${r.team}" data-team-id="${r.teamId}">
        <td style="color:${rankColor}">${r.rank}</td>
        <td title="${r.team}">${r.abbr || r.team}</td>
        <td class="${kCls}">${r.kpg.toFixed(2)}</td>
        <td class="${hCls}">${r.hpg.toFixed(2)}</td>
        <td class="${bbCls}">${r.bbpg.toFixed(2)}</td>
        <td class="${rCls}">${r.rpg.toFixed(2)}</td>
        <td style="${scoreStyle}">${r.score.toFixed(2)}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<table>
      <thead><tr>
        <th>Rank</th>
        <th style="text-align:left">Team</th>
        <th title="Strikeouts per game — higher is better">K/G ↑</th>
        <th title="Hits per game — lower is better">H/G ↓</th>
        <th title="Walks per game — lower is better">BB/G ↓</th>
        <th title="Runs per game — lower is better">R/G ↓</th>
        <th title="Score = K/G − H/G − BB/G − 2×R/G">Score</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;

    wrap.querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', () => openTeamModal(tr.dataset.team, Number(tr.dataset.teamId)));
    });
  }

  // ── Calendar view ───────────────────────────────────────────────

  async function renderCalendar(window) {
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '<div class="cal-loading">Loading schedule…</div>';

    // Build composite rank lookup from the active window (season / last30 / last15)
    const rankMap = {};
    if (statsData) {
      for (const r of statsData[window]) {
        rankMap[r.teamId] = { rank: r.rank, composite: r.composite, team: r.team };
      }
    }

    const today = new Date();
    const end = new Date(today);
    end.setDate(end.getDate() + 4);
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1` +
      `&startDate=${fmt(today)}&endDate=${fmt(end)}&hydrate=probablePitcher`;

    let data;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (err) {
      grid.innerHTML = `<div class="cal-error">Failed to load schedule.<br><small>${err.message}</small></div>`;
      return;
    }

    // Build date → sorted pitcher entries
    const dateMap = {};
    for (const dateObj of (data.dates || [])) {
      const dk = dateObj.date;
      if (!dateMap[dk]) dateMap[dk] = [];

      for (const g of dateObj.games) {
        const homeId = g.teams.home.team.id;
        const awayId = g.teams.away.team.id;

        // Away pitcher faces home batters → rank by home team's composite
        const awayPitcher = g.teams.away.probablePitcher;
        const homeRank = rankMap[homeId];
        if (homeRank) {
          dateMap[dk].push({
            battingTeamId: homeId,
            battingTeam: g.teams.home.team.name,
            rank: homeRank.rank,
            composite: homeRank.composite,
            pitcher: awayPitcher || null,
            venue: 'home',
          });
        }

        // Home pitcher faces away batters → rank by away team's composite
        const homePitcher = g.teams.home.probablePitcher;
        const awayRank = rankMap[awayId];
        if (awayRank) {
          dateMap[dk].push({
            battingTeamId: awayId,
            battingTeam: g.teams.away.team.name,
            rank: awayRank.rank,
            composite: awayRank.composite,
            pitcher: homePitcher || null,
            venue: 'away',
          });
        }
      }
    }

    // Sort each day by batting team rank ascending (rank 1 = best matchup on top)
    for (const dk of Object.keys(dateMap)) {
      dateMap[dk].sort((a, b) => a.rank - b.rank);
    }

    const days = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      days.push(fmt(d));
    }

    grid.innerHTML = days.map(dk => {
      const entries = dateMap[dk] || [];
      const header = `<div class="cal-header">${fmtDate(dk)}</div>`;

      if (!entries.length) {
        return `<div class="cal-col">${header}<div class="cal-entry" style="color:var(--muted);font-size:0.8rem;padding:0.75rem">No games</div></div>`;
      }

      const rows = entries.map(e => {
        const name = e.pitcher?.fullName;
        const hand = e.pitcher?.pitchHand?.code;
        const teamShort = e.battingTeam.replace(/^.+ /, '');

        return `<div class="cal-entry">
          <div class="cal-rank" style="color:${compColor(e.rank)}">vs ${teamShort} — #${e.rank}</div>
          <div class="cal-pitcher${name ? '' : ' tbd'}">${name || 'TBD'}</div>
          <div class="cal-meta">
            ${hand ? `<span class="cal-hand">${hand}HP</span>` : ''}
          </div>
        </div>`;
      }).join('');

      return `<div class="cal-col">${header}${rows}</div>`;
    }).join('');

  }

  // ── Tab switching ───────────────────────────────────────────────

  let activeView = 'rankings'; // 'rankings' or 'calendar'

  function switchWindow(key) {
    activeWindow = key;
    document.querySelectorAll('.tab[data-key]')
      .forEach(t => t.classList.toggle('active', t.dataset.key === key));
    if (statsData) {
      if (activeView === 'rankings') renderTable(statsData[key]);
      else renderCalendar(key);
    }
  }

  function switchView(view) {
    activeView = view;
    document.querySelectorAll('.tab[data-view]')
      .forEach(t => t.classList.toggle('active', t.dataset.view === view));
    const isCalendar = view === 'calendar';
    document.getElementById('rankings-view').style.display = isCalendar ? 'none' : 'block';
    document.getElementById('calendar-view').style.display = isCalendar ? 'block' : 'none';
    if (statsData) {
      if (isCalendar) renderCalendar(activeWindow);
      else renderTable(statsData[activeWindow]);
    }
  }

  document.querySelectorAll('.tab[data-key]').forEach(btn => {
    btn.addEventListener('click', () => switchWindow(btn.dataset.key));
  });

  document.querySelectorAll('.tab[data-view]').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  // ── Team modal ──────────────────────────────────────────────────

  const backdrop = document.getElementById('modal-backdrop');
  const modalTitle = document.getElementById('modal-title');
  const pitcherList = document.getElementById('pitcher-list');

  document.getElementById('modal-close').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() { backdrop.classList.remove('open'); }

  async function openTeamModal(teamName, teamId) {
    modalTitle.textContent = teamName;
    pitcherList.innerHTML = '<div class="modal-loading">Loading schedule…</div>';
    backdrop.classList.add('open');

    const today = new Date();
    const end = new Date(today);
    end.setDate(end.getDate() + 4);
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${teamId}` +
      `&startDate=${fmt(today)}&endDate=${fmt(end)}&hydrate=probablePitcher`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const games = (data.dates || []).flatMap(d => d.games || []);

      if (!games.length) {
        pitcherList.innerHTML = '<div class="modal-loading">No games scheduled in the next 5 days.</div>';
        return;
      }

      pitcherList.innerHTML = games.map(g => {
        const isHome = g.teams.home.team.id === teamId;
        const opp = isHome ? g.teams.away.team.name : g.teams.home.team.name;
        const prefix = isHome ? 'vs' : '@';
        const pitcher = isHome
          ? g.teams.away.probablePitcher
          : g.teams.home.probablePitcher;

        const name = pitcher ? pitcher.fullName : null;
        const hand = pitcher?.pitchHand?.code || null;

        return `<div class="pitcher-row">
          <span class="pitcher-date">${fmtDate(g.gameDate.slice(0,10))}</span>
          <span class="pitcher-opp">${prefix} ${opp.replace(/^.+ /, '')}</span>
          ${name
            ? `<span class="pitcher-name">${name}</span>${hand ? `<span class="pitcher-hand">${hand}HP</span>` : ''}`
            : `<span class="pitcher-name pitcher-tbd">TBD</span>`}
        </div>`;
      }).join('');

    } catch (err) {
      pitcherList.innerHTML = `<div class="modal-error">Failed to load schedule.<br><small>${err.message}</small></div>`;
    }
  }

  // ── Boot ────────────────────────────────────────────────────────

  fetch('./data/stats.json?v=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      statsData = data;
      document.getElementById('updated').textContent = `Updated: ${data.updated}`;
      renderTable(data[activeWindow]);
    })
    .catch(err => {
      document.getElementById('table-wrap').innerHTML =
        `<div class="error">Failed to load stats.json — run fetch_stats.py first.<br><small>${err.message}</small></div>`;
    });
</script>
</body>
</html>
